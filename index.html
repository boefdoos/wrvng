<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WRVNG</title>
<meta name="description" content="WRVNG — Spectacle Of Fear. New single out now."/>
<meta property="og:title" content="WRVNG — Spectacle Of Fear"/>
<meta property="og:image" content="assets/artwork.jpg"/>
<meta property="og:type" content="music.song"/>
<meta name="twitter:card" content="summary_large_image"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#060606;
  --white:#e2ddd5;
  --teal:#e2ddd5;
  --teal-dark:#111111;
}
html{scroll-behavior:smooth}
body{
  background:var(--black);
  color:var(--white);
  font-family:'IBM Plex Mono',monospace;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
.hero{
  position:relative;
  width:100%;
  height:100svh;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:32px 24px 0;
  overflow:hidden;
}
.hero__video{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:0;
}
.hero__overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(6,6,6,.92) 0%,rgba(6,6,6,.2) 55%,rgba(6,6,6,.45) 100%);
  z-index:1;
}
.hero__content{position:relative;z-index:2;padding-top:8px}
.hero__single-label{
  font-size:11px;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:var(--teal);
  margin-bottom:10px;
  display:block;
}
.hero__band{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(72px,22vw,140px);
  line-height:.85;
  color:var(--white);
  display:block;
}
.hero__title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(32px,10vw,64px);
  line-height:.9;
  color:var(--teal);
  display:block;
  margin-top:8px;
}
.links{padding:0 24px;display:flex;flex-direction:column}
.links--hero{
  padding:0;
  position:relative;
  z-index:2;
  background:linear-gradient(to top,rgba(6,6,6,0.97) 60%,transparent 100%);
  margin:0 -24px;
  padding:24px 24px 0;
}
.links__heading{
  font-size:10px;
  letter-spacing:.28em;
  text-transform:uppercase;
  color:var(--white);
  opacity:.3;
  padding:28px 0 16px;
  border-bottom:1px solid #1a1a1a;
}
.link-item{
  display:flex;
  align-items:center;
  gap:14px;
  padding:18px 0;
  border-bottom:1px solid #1a1a1a;
  text-decoration:none;
  color:var(--white);
  font-size:15px;
  letter-spacing:.08em;
  text-transform:uppercase;
  transition:color .15s;
  -webkit-tap-highlight-color:transparent;
}
.link-item:active{opacity:.6}
.link-item__arrow{margin-left:auto;font-size:18px;opacity:.3}
.link-item--spotify:hover  {color:#1DB954}
.link-item--apple:hover    {color:#fc3c44}
.link-item--qobuz:hover    {color:#0070EF}
.link-item--deezer:hover   {color:#FEAA2D}
.link-item--tidal:hover    {color:#var(--white)}
.artwork{
  margin:40px 24px 0;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:1px;
  background:#111;
}
.artwork img{width:100%;aspect-ratio:1;object-fit:cover;display:block;filter:grayscale(1)}
.artwork__text{
  background:var(--teal-dark);
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:20px;
}
.artwork__text span:first-child{
  font-size:10px;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:var(--teal);
  margin-bottom:8px;
}
.artwork__text strong{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(24px,7vw,42px);
  line-height:.9;
  font-weight:400;
  color:var(--white);
}
.ep{
  padding:48px 24px 40px;
  border-top:1px solid #1a1a1a;
  margin-top:40px;
}
.ep__label{
  font-size:10px;
  letter-spacing:.28em;
  text-transform:uppercase;
  color:var(--teal);
  margin-bottom:12px;
  display:block;
}
.ep__title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(42px,13vw,80px);
  line-height:.88;
  color:var(--white);
}
.ep__date{
  font-size:11px;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--white);
  opacity:.35;
  margin-top:14px;
  display:block;
}
footer{
  padding:24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-top:1px solid #1a1a1a;
}
.footer__copy{font-size:10px;letter-spacing:.1em;text-transform:uppercase;opacity:.25}
.footer__ig{
  display:inline-flex;
  align-items:center;
  gap:8px;
  font-size:11px;
  letter-spacing:.15em;
  text-transform:uppercase;
  color:var(--white);
  text-decoration:none;
  opacity:.5;
  transition:opacity .15s;
}
.footer__ig:hover{opacity:1}
@media(min-width:500px){
  .hero,.links,.artwork,.ep,footer{max-width:480px;margin-left:auto;margin-right:auto}
  .artwork{margin-top:40px}
}
</style>
</head>
